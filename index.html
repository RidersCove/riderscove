<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riders Cove | The Rider's Brand</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:#fff;
}

.hero{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
padding:20px;
}

.hero img{
width:100%;
max-width:1400px;
display:block;
}

.shop{
padding:80px 10%;
text-align:center;
}

.shop h2{
font-size:3rem;
margin-bottom:50px;
letter-spacing:4px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.product{
background:#111;
border:1px solid #222;
padding:30px;
}

.product h3{
margin-bottom:10px;
}

.price{
font-size:1.2rem;
font-weight:bold;
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:12px 25px;
border:1px solid white;
color:white;
text-decoration:none;
}

.btn:hover{
background:white;
color:black;
}

footer{
padding:50px;
text-align:center;
border-top:1px solid #222;
color:#777;
}
</style>
</head>

<body>

<section class="hero">
<img src="brand-board.png" alt="Riders Cove">
</section>

<section class="shop">

<h2>FEATURED PRODUCTS</h2>

<div class="products">

<div class="product">
<h3>RC PREMIUM HOODIE</h3>
<div class="price">$60</div>
<a href="#" class="btn">COMING SOON</a>
</div>

<div class="product">
<h3>RC ESSENTIAL TEE</h3>
<div class="price">$35</div>
<a href="#" class="btn">COMING SOON</a>
</div>

<div class="product">
<h3>RC STICKER PACK</h3>
<div class="price">$5</div>
<a href="#" class="btn">COMING SOON</a>
</div>

<div class="product">
<h3>RC BOLT KIT</h3>
<div class="price">$25</div>
<a href="#" class="btn">COMING SOON</a>
</div>

</div>

</section>

<footer>
© 2026 RIDERS COVE • THE RIDER'S BRAND
</footer>

</body>
</html>
