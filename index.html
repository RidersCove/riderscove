<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riders Cove | The Rider's Brand</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
overflow:hidden;
}

.container{
height:100vh;
display:grid;
grid-template-rows:32% 22% 22% 20%;
gap:8px;
padding:8px;
}

.panel{
background:#000;
border:1px solid #222;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero{
flex-direction:column;
}

.hero h1{
font-size:clamp(4rem,9vw,10rem);
font-weight:900;
font-style:italic;
line-height:.85;
}

.hero p{
margin-top:15px;
letter-spacing:12px;
color:#aaa;
font-size:1rem;
}

.row{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}

.box-title{
font-size:2rem;
font-weight:800;
font-style:italic;
}

.brand{
flex-direction:column;
padding:20px;
}

.brand h2{
font-size:2.2rem;
letter-spacing:5px;
margin-bottom:15px;
}

.brand p{
color:#aaa;
line-height:1.8;
}

.palette{
display:flex;
gap:12px;
}

.color{
width:60px;
height:60px;
border:1px solid #333;
}

.socials{
flex-direction:column;
}

.socials h3{
margin-bottom:15px;
}

.socials p{
margin:4px 0;
color:#aaa;
}

.panel:hover{
border-color:#fff;
transition:.2s;
}

@media(max-width:1000px){

body{
overflow:auto;
}

.container{
height:auto;
}

.row{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="panel hero">
<h1>RIDERS<br>COVE</h1>
<p>THE RIDER'S BRAND</p>
</div>

<div class="row">

<div class="panel">
<div class="box-title">BIKE MODS</div>
</div>

<div class="panel">
<div class="box-title">SHIESTYS</div>
</div>

<div class="panel">
<div class="box-title">JEANS</div>
</div>

</div>

<div class="row">

<div class="panel">
<div class="box-title">HOODIES</div>
</div>

<div class="panel">
<div class="box-title">STICKERS</div>
</div>

<div class="panel">
<div class="box-title">TEES</div>
</div>

</div>

<div class="row">

<div class="panel">

<div class="palette">
<div class="color" style="background:#000000;"></div>
<div class="color" style="background:#ffffff;"></div>
<div class="color" style="background:#0066ff;"></div>
</div>

</div>

<div class="panel brand">

<h2>THE RIDER'S BRAND</h2>

<p>
BIKE MODS • SHIESTYS • JEANS<br>
HOODIES • STICKERS • TEES<br>
ALUMINUM BOLTS
</p>

</div>

<div class="panel socials">

<h3>SOCIALS</h3>

<p>YouTube</p>
<p><strong>RidersCove</strong></p>

<br>

<p>Email</p>
<p><strong>RidersCoveOfficial@gmail.com</strong></p>

</div>

</div>

</div>

</body>
</html>
