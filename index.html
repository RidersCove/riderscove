<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riders Cove | The Rider's Brand</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    overflow:hidden;
}

.wrapper{
    height:100vh;
    display:grid;
    grid-template-rows:22% 26% 26% 22%;
    gap:10px;
    padding:10px;
}

.box{
    background:#070707;
    border:1px solid #1d1d1d;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:.2s;
}

.box:hover{
    border-color:#ffffff;
}

.hero{
    flex-direction:column;
}

.hero h1{
    font-size:clamp(3rem,8vw,7rem);
    font-weight:900;
    letter-spacing:2px;
    font-style:italic;
    line-height:.9;
}

.hero p{
    margin-top:10px;
    color:#999;
    letter-spacing:8px;
    font-size:.9rem;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

.logo{
    font-size:2rem;
    font-weight:900;
    font-style:italic;
}

.rc{
    font-size:4rem;
    font-weight:900;
}

.circle{
    width:120px;
    height:120px;
    border:4px solid #fff;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    font-weight:900;
}

.mockup{
    font-size:1.8rem;
    font-weight:700;
    color:#ddd;
}

.brand{
    flex-direction:column;
    padding:20px;
}

.brand h2{
    margin-bottom:10px;
    letter-spacing:6px;
}

.brand p{
    color:#999;
    font-size:.85rem;
}

.palette{
    display:flex;
    gap:10px;
}

.color{
    width:55px;
    height:55px;
    border-radius:8px;
    border:1px solid #333;
}

@media(max-width:900px){
    body{
        overflow:auto;
    }

    .wrapper{
        height:auto;
        grid-template-rows:auto;
    }

    .row{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="wrapper">

    <div class="box hero">
        <h1>RIDERS<br>COVE</h1>
        <p>THE RIDER'S BRAND</p>
    </div>

    <div class="row">
        <div class="box">
            <div class="logo">RIDERS COVE</div>
        </div>

        <div class="box">
            <div class="rc">RC</div>
        </div>

        <div class="box">
            <div class="circle">RC</div>
        </div>
    </div>

    <div class="row">
        <div class="box">
            <div class="mockup">HOODIE</div>
        </div>

        <div class="box">
            <div class="mockup">TEE</div>
        </div>

        <div class="box">
            <div class="mockup">STICKERS</div>
        </div>
    </div>

    <div class="row">

        <div class="box">
            <div class="palette">
                <div class="color" style="background:#000;"></div>
                <div class="color" style="background:#fff;"></div>
                <div class="color" style="background:#0066ff;"></div>
            </div>
        </div>

        <div class="box brand">
            <h2>THE RIDER'S BRAND</h2>
            <p>
                APPAREL • MODS • ALUMINUM BOLTS •
                ACCESSORIES • FUTURE BIKES
            </p>
        </div>

        <div class="box">
            <div class="rc">RC</div>
        </div>

    </div>

</div>

</body>
</html>
